name: Metrics

on:
  # Atualiza todo dia às 00:30 UTC
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Gerar painel de metrics
        uses: lowlighter/metrics@latest
        with:
          # Token pessoal (PAT) salvo como secret METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}
          user: Kina25
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Bahia
          config_order: base.header, base.activity, base.community, base.repositories, languages, isocalendar, habits, base.metadata

          # Linguagens mais usadas
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Calendário isométrico 3D do último ano
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Hábitos de commit (horários, dias, linguagens)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
